services:
  wss_app:
    image: ghcr.io/vasilii-kostiuc/simple-dictionary-wss:latest
    container_name: wss_app
    restart: unless-stopped
    working_dir: /var/www/html
    command: [ "php", "artisan", "websocket:serve" ]
    volumes:
      - wss_code:/var/www/html
      - storage_data:/var/www/html/storage
      - cache_data:/var/www/html/bootstrap/cache
      - ./.env:/var/www/wss/.env:ro
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MONGODB_HOST=mongo
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=wss_db
      - API_BASE_URI=${API_BASE_URI}
      - WSS_SERVICE_SECRET=${WSS_SERVICE_SECRET}
      - MESSAGING_BROKER=redis
      - PROMETHEUS_ENABLED=true
      - PROMETHEUS_HOST=0.0.0.0
      - PROMETHEUS_PORT=9091
      - PROMETHEUS_PATH=/metrics
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - redis
    networks:
      - simple_dictionary_network

  mongo:
    image: mongo:8.0.15
    container_name: wss_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - simple_dictionary_network
  redis:
    image: redis:7-alpine
    container_name: wss_redis
    restart: unless-stopped
    networks:
      - simple_dictionary_network

  redis_exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: wss_redis_exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis
    expose:
      - "9121"
    networks:
      - simple_dictionary_network

  prometheus:
    image: prom/prometheus:latest
    container_name: wss_prometheus
    restart: unless-stopped
    depends_on:
      - wss_app
      - redis_exporter
    volumes:
      - ./_docker/prometheus/prometheus.single.yml:/etc/prometheus/prometheus.yml:ro
    expose:
      - "9090"
    networks:
      - simple_dictionary_network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: wss_redisinsight
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - redisinsight_data:/data
    ports:
      - "5540:5540"
    networks:
      - simple_dictionary_network

  grafana:
    image: grafana/grafana:11.5.2
    container_name: wss_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./_docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./_docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    networks:
      - simple_dictionary_network

volumes:
  wss_code:
  storage_data:
  cache_data:
  mongo_data:
  redisinsight_data:
  grafana_data:


networks:
  simple_dictionary_network:
    external: true
    name: laravel-api_simple_dictionary_network
