services:
  wss_app:
    image: ghcr.io/vasilii-kostiuc/simple-dictionary-wss:latest
    container_name: wss_app
    restart: unless-stopped
    working_dir: /var/www/html
    command: [ "php", "artisan", "websocket:serve" ]
    volumes:
      - wss_code:/var/www/html
      - storage_data:/var/www/html/storage
      - cache_data:/var/www/html/bootstrap/cache
      - ./.env:/var/www/wss/.env:ro
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MONGODB_HOST=mongo
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=wss_db
      - API_BASE_URI=${API_BASE_URI}
      - WSS_SERVICE_SECRET=${WSS_SERVICE_SECRET}
      - MESSAGING_BROKER=redis
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - redis
    networks:
      - simple_dictionary_network

  mongo:
    image: mongo:8.0.15
    container_name: wss_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - simple_dictionary_network
  redis:
    image: redis:7-alpine
    container_name: wss_redis
    restart: unless-stopped
    networks:
      - simple_dictionary_network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: wss_redisinsight
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - redisinsight_data:/data
    ports:
      - "5540:5540"
    networks:
      - simple_dictionary_network
volumes:
  wss_code:
  storage_data:
  cache_data:
  mongo_data:
  redisinsight_data:


networks:
  simple_dictionary_network:
    external: true
    name: laravel-api_simple_dictionary_network
