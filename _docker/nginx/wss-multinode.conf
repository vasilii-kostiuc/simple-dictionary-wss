upstream websocket_backend {
    # random: distributes each new connection randomly — works locally where all clients share one IP
    # and connections are short-lived (least_conn falls back to first server when all counts are 0)
    # in production on Hetzner/AWS: switch to ip_hash (sticky sessions per real client IP)
    random;
    server wss_app_1:8080 max_fails=0;
    server wss_app_2:8080 max_fails=0;
    server wss_app_3:8080 max_fails=0;
}

log_format upstream_log '$remote_addr → $upstream_addr [$time_local] "$request" $status';

server {
    listen 8080;
    server_name _;

    access_log /var/log/nginx/access.log upstream_log;

    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://websocket_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_connect_timeout 5s;
    }
}
