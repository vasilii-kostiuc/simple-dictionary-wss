networks:
  simple_dictionary_network:
    external: true

services:
  wss_app:
    build:
      context: .
      dockerfile: _docker/wss_app/Dockerfile
    container_name: wss_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./_docker/wss_app/entrypoint.sh:/usr/local/bin/entrypoint.sh
    networks:
      - simple_dictionary_network
    depends_on:
      - redis
      - mongo
    environment:
      PROMETHEUS_ENABLED: "true"
      PROMETHEUS_HOST: 0.0.0.0
      PROMETHEUS_PORT: 9091
      PROMETHEUS_PATH: /metrics
    ports:
      - "8080:8080"
      - "9091:9091"
    command: [ "tail", "-f", "/dev/null" ]

  redis:
    image: redis:alpine
    container_name: wss_redis
    networks:
      - simple_dictionary_network
    ports:
      - "6379:6379"

  redisinsight:
    image: redis/redisinsight:latest
    container_name: wss_redisinsight
    depends_on:
      - redis
    volumes:
      - redisinsight_data:/data
    ports:
      - "5540:5540"
    networks:
      - simple_dictionary_network

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: wss_redis_exporter
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      - redis
    ports:
      - "9121:9121"
    networks:
      - simple_dictionary_network

  prometheus:
    image: prom/prometheus:latest
    container_name: wss_prometheus
    depends_on:
      - wss_app
      - redis_exporter
    volumes:
      - ./_docker/prometheus/prometheus.single.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - simple_dictionary_network

  mongo:
    image: mongo:8.0.15
    container_name: wss_mongo
    volumes:
      - ./tmp/mongo:/data/db
    ports:
      - "27017:27017"
    networks:
      - simple_dictionary_network

  mongo_express:
    image: mongo-express:latest
    container_name: wss_mongo_express
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8081:8081"
    networks:
      - simple_dictionary_network

volumes:
  redisinsight_data:
